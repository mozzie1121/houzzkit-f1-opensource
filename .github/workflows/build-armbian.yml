name: Build Armbian for HOUZZkit Force 1 (RK3568)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - name: Checkout source (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc make g++ libssl-dev liblz4-tool expect patchelf chrpath \
            gawk texinfo diffstat binfmt-support qemu-user-static \
            bison flex fakeroot cmake unzip device-tree-compiler \
            python3-pip libncurses-dev bzip2 \
            u-boot-tools swig python3-distutils \
            python3-dev python3-setuptools \
            cpio rsync bc \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          sudo pip3 install pyelftools -q

      - name: Build kernel (Image + dtb + modules + deb)
        working-directory: houzzkit-f1-bsp-k6199/kernel-6.1
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export KCFLAGS="-Wno-error=misleading-indentation"

          make distclean
          make jl_v1_linux_defconfig
          make -j$(nproc) Image
          make rockchip/rk3568-jl-rm01.dtb
          make -j$(nproc) modules

          mkdir -p ../kernel-deb/DEBIAN ../kernel-deb/boot ../kernel-deb/lib/modules
          INSTALL_MOD_PATH=../kernel-deb make modules_install
          cp arch/arm64/boot/Image ../kernel-deb/boot/vmlinuz-6.1.0-houzzkit
          cp arch/arm64/boot/dts/rockchip/rk3568-jl-rm01.dtb ../kernel-deb/boot/

          KERNEL_VER=$(make kernelversion 2>/dev/null | tail -1)

          cat > ../kernel-deb/DEBIAN/control << CONTROL
          Package: linux-image-houzzkit
          Version: ${KERNEL_VER}-houzzkit-1
          Architecture: arm64
          Maintainer: Hermes Agent
          Description: Custom kernel for HOUZZkit Force 1 (RK3568)
          CONTROL

          cat > ../kernel-deb/DEBIAN/postinst << 'POSTINST'
          set -e
          if [ -d /boot ]; then
            mkdir -p /boot/dtb/rockchip
            cp /boot/rk3568-jl-rm01.dtb /boot/dtb/rockchip/ 2>/dev/null || true
          fi
          POSTINST

          chmod 755 ../kernel-deb/DEBIAN/postinst
          dpkg-deb --build ../kernel-deb ../linux-image-houzzkit_${KERNEL_VER}-houzzkit-1_arm64.deb
          ls -la ../linux-image-*.deb

      - name: Upload kernel packages
        uses: actions/upload-artifact@v4
        with:
          name: kernel-debs
          path: houzzkit-f1-bsp-k6199/linux-image-*.deb
          retention-days: 3

      - name: Build U-Boot
        working-directory: houzzkit-f1-bsp-k6199/u-boot
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make distclean
          make rk3568_defconfig
          make -j$(nproc)
          mkdir -p ../uboot-output
          find .. -name "MiniLoaderAll.bin" -exec cp {} ../uboot-output/ \; 2>/dev/null || true
          find .. -name "uboot.img" -exec cp {} ../uboot-output/ \; 2>/dev/null || true
          ls -la ../uboot-output/

      - name: Checkout Armbian build system
        uses: actions/checkout@v4
        with:
          repository: armbian/build
          path: armbian-build
          fetch-depth: 1

      - name: Build Armbian rootfs
        working-directory: armbian-build
        run: |
          mkdir -p output
          sudo ./compile.sh \
            BUILD_MINIMAL=yes \
            BOARD=rockchip-rk3568 \
            BRANCH=current \
            RELEASE=bookworm \
            BUILD_DESKTOP=no \
            KERNEL_ONLY=no \
            KERNEL_CONFIGURE=no \
            EXPERT=yes \
            SKIP_KERNEL_CHECK=yes \
            SKIP_BOOTSPLASH=yes \
            FORCE_CHECKOUT=yes \
            IGNORE_UPDATES=yes \
            PROGRESS_DISPLAY=plain 2>&1 | tail -20

      - name: Assemble final output
        run: |
          mkdir -p final-output
          find armbian-build/output -name "*.img" -exec cp {} final-output/ \; 2>/dev/null || true
          find houzzkit-f1-bsp-k6199 -name "linux-image-*.deb" -exec cp {} final-output/ \; 2>/dev/null || true
          find . -name "MiniLoaderAll.bin" -o -name "uboot.img" | while read f; do cp "$f" final-output/; done 2>/dev/null || true
          ls -lh final-output/

      - name: Upload final artifacts
        uses: actions/upload-artifact@v4
        with:
          name: houzzkit-f1-armbian-image
          path: final-output/
          retention-days: 7
