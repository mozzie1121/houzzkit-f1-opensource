name: Build Armbian for HOUZZkit Force 1 (RK3568)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout source (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            make gcc libssl-dev liblz4-tool expect patchelf chrpath \
            gawk texinfo diffstat binfmt-support qemu-user-static \
            bison flex fakeroot cmake unzip device-tree-compiler \
            python3-pip libncurses-dev bzip2 \
            u-boot-tools swig python3-distutils \
            python3-dev python3-setuptools \
            cpio rsync bc dosfstools mtools \
            xz-utils pigz fdisk e2fsprogs
          sudo pip3 install pyelftools -q

      - name: Build kernel (Image + dtb + modules)
        working-directory: houzzkit-f1-bsp-k6199/kernel-6.1
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export KCFLAGS="-Wno-error=misleading-indentation"

          make distclean
          make jl_v1_linux_defconfig
          make -j$(nproc) Image
          make rockchip/rk3568-jl-rm01.dtb
          make -j$(nproc) modules
          make -j$(nproc) dtbs

          mkdir -p ../../kernel-staging/boot ../../kernel-staging/lib/modules
          INSTALL_MOD_PATH=../../kernel-staging make modules_install
          cp arch/arm64/boot/Image ../../kernel-staging/boot/
          cp arch/arm64/boot/dts/rockchip/rk3568-jl-rm01.dtb ../../kernel-staging/boot/
          # Copy all rockchip dtbs for compatibility
          mkdir -p ../../kernel-staging/boot/dtb/rockchip
          cp arch/arm64/boot/dts/rockchip/*.dtb ../../kernel-staging/boot/dtb/rockchip/ 2>/dev/null || true
          echo "Kernel built:"
          ls -la ../../kernel-staging/boot/

      - name: Build U-Boot
        working-directory: houzzkit-f1-bsp-k6199/u-boot
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make distclean
          make rk3568_defconfig
          make -j$(nproc) u-boot.itb
          make -j$(nproc) idbloader.img
          mkdir -p ../../uboot-output
          cp u-boot.itb ../../uboot-output/
          cp idbloader.img ../../uboot-output/
          ls -la ../../uboot-output/

      - name: Clone Armbian build system
        run: |
          git clone --depth 1 https://github.com/armbian/build.git armbian-build
          ls -la armbian-build/

      - name: Build Armbian rootfs only (skip kernel)
        working-directory: armbian-build
        run: |
          # Create userpatches/boards directory for our board config
          mkdir -p userpatches/boards userpatches/kernel

          # Write board config for HOUZZkit F1
          cat > userpatches/boards/houzzkit-f1.csc << 'BOARD'
          # HOUZZkit Force 1 (RK3568)
          BOARD_NAME="HOUZZkit Force 1"
          BOARDFAMILY="rk3568"
          BOOTCONFIG="rk3568_defconfig"
          OVERLAY_PREFIX="rockchip"
          LINUXFAMILY="rk3568"
          LINUXCONFIG="linux-rockchip-rk3568"
          KERNEL_TARGET="current,edge"
          BOOT_FDT_FILE="rockchip/rk3568-jl-rm01.dtb"
          BOARD
          
          # Build rootfs only (KERNEL_ONLY=no means build full image including rootfs)
          # SKIP_KERNEL_CHECK=yes to use our kernel
          # KERNEL_ONLY=yes means only build rootfs without kernel
          # Actually KERNEL_ONLY=no means build full image (includes kernel from armbian repo)
          # We want KERNEL_ONLY=yes to just get rootfs, then we inject our kernel
          
          sudo ./compile.sh \
            BOARD=houzzkit-f1 \
            BRANCH=current \
            RELEASE=bookworm \
            BUILD_MINIMAL=yes \
            BUILD_DESKTOP=no \
            KERNEL_ONLY=yes \
            KERNEL_CONFIGURE=no \
            SKIP_KERNEL_CHECK=yes \
            EXPERT=yes \
            PROGRESS_DISPLAY=plain 2>&1 || true

          echo "=== Build output ==="
          find output -name "*.img" -o -name "*.tar" -o -name "*.tar.xz" -o -name "*.rootfs" 2>/dev/null | head -10
          ls -lh output/ 2>/dev/null || echo "No output dir"
          ls -lh .tmp/ 2>/dev/null || true

      - name: Check build output
        run: |
          echo "=== ArmBuild output ==="
          find armbian-build -name "*.img*" -type f 2>/dev/null | head -10
          find armbian-build -name "*.rootfs*" -type f 2>/dev/null | head -10
          find armbian-build/output -type f 2>/dev/null | head -20 || true
          find armbian-build/.tmp -type f 2>/dev/null | head -20 || true

      - name: Assemble final image
        run: |
          set -e
          mkdir -p final-output staging

          # Find the rootfs cache or built rootfs
          ROOTFS_ARCHIVE=$(find armbian-build -maxdepth 5 -name "*.tar*" -path "*/rootfs*" 2>/dev/null | head -1)
          if [ -z "$ROOTFS_ARCHIVE" ]; then
            ROOTFS_ARCHIVE=$(find armbian-build -maxdepth 5 -name "*.tar*" 2>/dev/null | head -1)
          fi
          
          if [ -z "$ROOTFS_ARCHIVE" ]; then
            # Look for cached rootfs
            ROOTFS_ARCHIVE=$(find armbian-build -maxdepth 5 -name "Armbian_*" -o -name "*.rootfs*" 2>/dev/null | head -1)
          fi

          echo "Rootfs archive: $ROOTFS_ARCHIVE"

          if [ -z "$ROOTFS_ARCHIVE" ]; then
            echo "No rootfs found from armbian build, creating minimal rootfs"
            
            # Create a minimal Debian rootfs with debootstrap
            sudo apt-get install -y -qq debootstrap qemu-user-static
            sudo mkdir -p staging/rootfs

            # Use debootstrap to create a minimal Bookworm rootfs
            sudo debootstrap --arch=arm64 --foreign bookworm staging/rootfs
            
            # Copy qemu user static binary
            sudo cp /usr/bin/qemu-aarch64-static staging/rootfs/usr/bin/
            
            # Complete the bootstrap in chroot
            sudo chroot staging/rootfs /debootstrap/debootstrap --second-stage
            
            # Basic setup
            sudo chroot staging/rootfs /bin/bash -c '
              apt-get update
              apt-get install -y --no-install-recommends \
                systemd systemd-sysv udev \
                openssh-server sudo curl wget \
                u-boot-tools f2fs-tools \
                network-manager \
                ca-certificates locales \
                kmod iptables nftables \
                armbian-config 2>/dev/null || true
              
              # Set root password
              echo "root:1234" | chpasswd
              
              # Generate locales
              echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
              locale-gen
              
              # Enable serial console
              systemctl enable serial-getty@ttyFIQ0.service 2>/dev/null || true
              systemctl enable serial-getty@ttyS2.service 2>/dev/null || true
            ' || true
          else
            echo "Using pre-built rootfs: $ROOTFS_ARCHIVE"
            ROOTFS_FILE="$ROOTFS_ARCHIVE"
          fi

          # Create disk image
          DISK_SIZE=2800  # MB
          dd if=/dev/zero of=staging/armbian.img bs=1M count=$DISK_SIZE status=progress

          # Partition: GPT with boot (256MB fat32) + rootfs (remaining ext4)
          sudo parted staging/armbian.img mktable gpt
          sudo parted staging/armbian.img mkpart primary fat32 8MiB 264MiB
          sudo parted staging/armbian.img mkpart primary ext4 264MiB 100%
          sudo parted staging/armbian.img set 1 boot on

          # Setup loop device
          LOOP=$(sudo losetup -fP --show staging/armbian.img)

          # Format partitions
          sudo mkfs.vfat -F32 -n BOOT "${LOOP}p1"
          sudo mkfs.ext4 -L rootfs "${LOOP}p2"

          # Mount
          mkdir -p mnt-boot mnt-root
          sudo mount "${LOOP}p1" mnt-boot
          sudo mount "${LOOP}p2" mnt-root

          # Install rootfs
          if [ -d staging/rootfs ]; then
            echo "Installing debootstrap rootfs..."
            sudo cp -a staging/rootfs/* mnt-root/
          elif [ -f "$ROOTFS_FILE" ]; then
            echo "Extracting rootfs archive..."
            case "$ROOTFS_FILE" in
              *.tar.xz) sudo tar -xJf "$ROOTFS_FILE" -C mnt-root/ ;;
              *.tar.gz)  sudo tar -xzf "$ROOTFS_FILE" -C mnt-root/ ;;
              *.tar.bz2) sudo tar -xjf "$ROOTFS_FILE" -C mnt-root/ ;;
              *.tar)     sudo tar -xf "$ROOTFS_FILE" -C mnt-root/ ;;
            esac
          fi

          # Install our kernel modules
          if [ -d kernel-staging/lib/modules ]; then
            MOD_VER=$(ls kernel-staging/lib/modules/ 2>/dev/null | head -1)
            if [ -n "$MOD_VER" ]; then
              sudo mkdir -p mnt-root/lib/modules
              sudo cp -a kernel-staging/lib/modules/$MOD_VER mnt-root/lib/modules/
              echo "Installed kernel modules: $MOD_VER"
            fi
          fi

          # Install kernel Image + dtb
          if [ -f kernel-staging/boot/Image ]; then
            sudo mkdir -p mnt-root/boot/dtb/rockchip
            sudo cp kernel-staging/boot/Image mnt-root/boot/vmlinuz-6.1.0-houzzkit
            sudo cp kernel-staging/boot/rk3568-jl-rm01.dtb mnt-root/boot/
            sudo cp kernel-staging/boot/rk3568-jl-rm01.dtb mnt-root/boot/dtb/rockchip/
            echo "Kernel Image + dtb installed"
          fi

          # Setup boot partition files
          # Copy kernel + dtb to boot partition too
          if [ -f kernel-staging/boot/Image ]; then
            sudo cp kernel-staging/boot/Image mnt-boot/Image
            sudo cp kernel-staging/boot/rk3568-jl-rm01.dtb mnt-boot/
          fi

          # Copy uboot files to boot partition
          if [ -f uboot-output/idbloader.img ]; then
            sudo cp uboot-output/idbloader.img mnt-boot/
          fi
          if [ -f uboot-output/u-boot.itb ]; then
            sudo cp uboot-output/u-boot.itb mnt-boot/
          fi

          # Create extlinux config
          sudo mkdir -p mnt-boot/extlinux
          cat | sudo tee mnt-boot/extlinux/extlinux.conf > /dev/null << 'EXTLINUX'
          LABEL Armbian
          LINUX /Image
          FDT /rk3568-jl-rm01.dtb
          APPEND root=/dev/mmcblk0p2 rw rootwait console=ttyFIQ0,1500000 console=tty0 earlycon=uart8250,mmio32,0xfe660000 net.ifnames=0 biosdevname=0
          EXTLINUX

          # Create armbianEnv.txt as backup
          cat | sudo tee mnt-boot/armbianEnv.txt > /dev/null << 'ENV'
          verbosity=1
          bootlogo=false
          overlay_prefix=rockchip
          fdtfile=rk3568-jl-rm01.dtb
          rootdev=/dev/mmcblk0p2
          rootfstype=ext4
          ENV

          # Also copy armbianEnv.txt to /boot
          sudo cp mnt-boot/armbianEnv.txt mnt-root/boot/ 2>/dev/null || true

          # Generate fstab
          echo "/dev/mmcblk0p2  /  ext4  defaults,noatime  0  1" | sudo tee -a mnt-root/etc/fstab > /dev/null
          echo "/dev/mmcblk0p1  /boot  vfat  defaults,noatime  0  2" | sudo tee -a mnt-root/etc/fstab > /dev/null

          # Fix rootfs boot directory - create symlinks
          sudo ln -sf /boot/dtb mnt-root/dtb 2>/dev/null || true

          sudo sync
          
          # Clean up mounts
          sudo umount mnt-boot mnt-root
          sudo losetup -d "$LOOP"

          # Write uboot to raw disk offsets (Rockchip boot flow)
          # idbloader.img goes to sector 64 (32KB offset)
          # u-boot.itb goes to sector 16384 (8MB offset)
          echo "Writing u-boot to raw image..."
          if [ -f uboot-output/idbloader.img ]; then
            dd if=uboot-output/idbloader.img of=staging/armbian.img bs=512 seek=64 conv=notrunc status=progress
          fi
          if [ -f uboot-output/u-boot.itb ]; then
            dd if=uboot-output/u-boot.itb of=staging/armbian.img bs=512 seek=16384 conv=notrunc status=progress
          fi

          # Compress and copy to final-output
          cp staging/armbian.img final-output/houzzkit-f1-armbian.img
          echo "=== Final image ==="
          ls -lh final-output/

      - name: Upload final artifacts
        uses: actions/upload-artifact@v4
        with:
          name: houzzkit-f1-armbian-image
          path: final-output/
          retention-days: 7
          if-no-files-found: warn
