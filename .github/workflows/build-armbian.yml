name: Build Armbian for HOUZZkit Force 1 (RK3568)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout source (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            make gcc libssl-dev liblz4-tool expect patchelf chrpath \
            gawk texinfo diffstat binfmt-support qemu-user-static \
            bison flex fakeroot cmake unzip device-tree-compiler \
            python3-pip libncurses-dev bzip2 \
            u-boot-tools swig python3-distutils \
            python3-dev python3-setuptools \
            cpio rsync bc dosfstools mtools \
            xz-utils pigz fdisk e2fsprogs debootstrap
          sudo pip3 install pyelftools -q

      - name: Build kernel (Image + dtb + modules)
        working-directory: houzzkit-f1-bsp-k6199/kernel-6.1
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export KCFLAGS="-Wno-error=misleading-indentation"

          make distclean
          make jl_v1_linux_defconfig
          make -j$(nproc) Image
          make rockchip/rk3568-jl-rm01.dtb
          make -j$(nproc) modules

          mkdir -p ../../kernel-staging/boot ../../kernel-staging/lib/modules
          INSTALL_MOD_PATH=../../kernel-staging make modules_install
          cp arch/arm64/boot/Image ../../kernel-staging/boot/
          cp arch/arm64/boot/dts/rockchip/rk3568-jl-rm01.dtb ../../kernel-staging/boot/
          echo "Kernel built:"
          ls -la ../../kernel-staging/boot/

      - name: Build U-Boot
        working-directory: houzzkit-f1-bsp-k6199/u-boot
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make distclean
          make rk3568_defconfig
          make -j$(nproc) 2>&1 || true
          if [ ! -f u-boot.itb ]; then
            echo "No u-boot.itb, building with dummy tee.bin..."
            touch tee.bin
            make -j$(nproc) u-boot.itb 2>&1 || true
            rm -f tee.bin
          fi
          mkdir -p ../../uboot-output
          for f in u-boot.itb idbloader.img u-boot.img; do
            [ -f "$f" ] && cp "$f" ../../uboot-output/ && echo "Collected: $f"
          done
          ls -la ../../uboot-output/

      - name: Build rootfs with debootstrap
        run: |
          sudo mkdir -p staging/rootfs
          echo "=== Creating minimal Debian Bookworm rootfs ==="
          sudo debootstrap --arch=arm64 --foreign bookworm staging/rootfs 2>&1
          sudo cp /usr/bin/qemu-aarch64-static staging/rootfs/usr/bin/
          sudo chroot staging/rootfs /debootstrap/debootstrap --second-stage 2>&1 || true
          sudo chroot staging/rootfs /bin/bash -c '
            apt-get update
            apt-get install -y --no-install-recommends \
              systemd systemd-sysv udev \
              openssh-server sudo curl wget \
              u-boot-tools network-manager \
              ca-certificates locales kmod 2>/dev/null || true
            echo "root:1234" | chpasswd
            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen
            systemctl enable serial-getty@ttyFIQ0.service 2>/dev/null || true
            systemctl enable serial-getty@ttyS2.service 2>/dev/null || true
          ' || true
          echo "=== Rootfs size ==="
          sudo du -sh staging/rootfs

      - name: Assemble final image
        run: |
          set -e
          mkdir -p final-output staging

          KERNEL_VER="6.1.99"
          DTB="rk3568-jl-rm01.dtb"

          # Create disk image (same layout as original eMMC)
          # Original: uboot(8MB)+misc(4MB)+boot(128MB ext4)+recovery(64MB)+backup(32MB)+rootfs(~5.3GB)+userdata(~24GB)
          # Ours:     uboot(8MB)+misc(4MB)+boot(128MB ext4)+rootfs(~2.5GB)
          DISK_SIZE=2800
          sudo dd if=/dev/zero of=staging/armbian.img bs=1M count=$DISK_SIZE status=progress

          # Create GPT partition table with PARTLABELs matching original
          sudo parted staging/armbian.img mktable gpt
          sudo parted staging/armbian.img mkpart uboot fat32 8MiB 16MiB
          sudo parted staging/armbian.img mkpart misc ext4 16MiB 20MiB
          sudo parted staging/armbian.img mkpart boot ext4 20MiB 148MiB
          sudo parted staging/armbian.img mkpart recovery ext4 148MiB 212MiB
          sudo parted staging/armbian.img mkpart backup ext4 212MiB 244MiB
          sudo parted staging/armbian.img mkpart rootfs ext4 244MiB 100%
          sudo parted staging/armbian.img set 1 boot on

          LOOP=$(sudo losetup -fP --show staging/armbian.img)
          echo "Loop device: $LOOP"

          # Format partitions (only boot + rootfs need filesystems)
          sudo mkfs.ext4 -L boot "${LOOP}p3" > /dev/null 2>&1
          sudo mkfs.ext4 -L rootfs "${LOOP}p6" > /dev/null 2>&1

          mkdir -p mnt-boot mnt-root
          sudo mount "${LOOP}p3" mnt-boot
          sudo mount "${LOOP}p6" mnt-root

          # Install rootfs
          if [ -d staging/rootfs ]; then
            echo "Installing debootstrap rootfs..."
            sudo cp -a staging/rootfs/* mnt-root/
          fi

          # Create /boot in rootfs
          sudo mkdir -p mnt-root/boot mnt-root/etc

          # Install kernel modules
          if [ -d kernel-staging/lib/modules ]; then
            MOD_VER=$(ls kernel-staging/lib/modules/ 2>/dev/null | head -1)
            if [ -n "$MOD_VER" ]; then
              sudo mkdir -p mnt-root/lib/modules
              sudo cp -a kernel-staging/lib/modules/$MOD_VER mnt-root/lib/modules/
              echo "Installed kernel modules: $MOD_VER"
            fi
          fi

          # Install kernel Image + dtb to boot partition (matching original naming)
          KERNEL_IMG="Image-${KERNEL_VER}"
          if [ -f kernel-staging/boot/Image ]; then
            sudo cp kernel-staging/boot/Image mnt-boot/${KERNEL_IMG}
            sudo cp kernel-staging/boot/${DTB} mnt-boot/
            sudo ln -sf ${DTB} mnt-boot/rk-kernel.dtb
            echo "Kernel + dtb installed to boot partition"
          fi

          # Also copy to rootfs /boot
          if [ -f kernel-staging/boot/Image ]; then
            sudo mkdir -p mnt-root/boot
            sudo cp kernel-staging/boot/Image mnt-root/boot/${KERNEL_IMG}
            sudo cp kernel-staging/boot/${DTB} mnt-root/boot/
            sudo ln -sf ${DTB} mnt-root/boot/rk-kernel.dtb 2>/dev/null || true
          fi

          # Create extlinux config (matching original format exactly)
          sudo mkdir -p mnt-boot/extlinux
          cat | sudo tee mnt-boot/extlinux/extlinux.conf > /dev/null << EXTLINUX
          label rk-kernel.dtb linux-${KERNEL_VER}
          \tkernel /${KERNEL_IMG}
          \tfdt /rk-kernel.dtb
          EXTLINUX

          # Generate fstab
          echo "PARTLABEL=rootfs  /  ext4  defaults,noatime  0  1" | sudo tee mnt-root/etc/fstab > /dev/null
          echo "PARTLABEL=boot  /boot  ext4  defaults,noatime  0  2" | sudo tee -a mnt-root/etc/fstab > /dev/null

          sudo sync

          # Clean up mounts
          sudo umount mnt-boot mnt-root
          sudo losetup -d "$LOOP"

          # Write uboot to raw disk offsets (same as original: sector 64 and 16384)
          echo "Writing u-boot to raw image..."
          if [ -f uboot-output/idbloader.img ]; then
            sudo dd if=uboot-output/idbloader.img of=staging/armbian.img bs=512 seek=64 conv=notrunc status=progress
          fi
          if [ -f uboot-output/u-boot.itb ]; then
            sudo dd if=uboot-output/u-boot.itb of=staging/armbian.img bs=512 seek=16384 conv=notrunc status=progress
          fi

          sudo cp staging/armbian.img final-output/houzzkit-f1-armbian.img
          echo "=== Final image ==="
          ls -lh final-output/

      - name: Upload final artifacts
        uses: actions/upload-artifact@v4
        with:
          name: houzzkit-f1-armbian-image
          path: final-output/
          retention-days: 7
          if-no-files-found: warn
